name: Release

on:
  push:
    tags:
      - 'v?[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute release name (strip leading v)
        id: relname
        run: |
          TAG="${GITHUB_REF_NAME}"
          NAME="${TAG#v}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create GitHub Release with assets
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.relname.outputs.name }}
          body: ''
          draft: false
          prerelease: false
          files: |
            main.js
            styles.css
            manifest.json
